name: CI/CD Pipeline AWS ECS Fargate

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 325826732988.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER: innovatech-cluster

jobs:
  build-and-deploy-ventas:
    name: Build & Deploy Ventas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar Pruebas Unitarias (Ventas)
        working-directory: ./back-Ventas_SpringBoot/Springboot-API-REST
        run: |
          chmod +x ./mvnw
          ./mvnw test

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, y push de imagen (Ventas)
        working-directory: ./back-Ventas_SpringBoot/Springboot-API-REST
        env:
          ECR_REPOSITORY: innovatech-ventas
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push -a $ECR_REGISTRY/$ECR_REPOSITORY

      - name: Renderizar Task Definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs/task-def-ventas.json
          container-name: innovatech-ventas
          image: ${{ env.ECR_REGISTRY }}/innovatech-ventas:${{ github.sha }}

      - name: Deploy a Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: innovatech-ventas-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  build-and-deploy-despachos:
    name: Build & Deploy Despachos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar Pruebas Unitarias (Despachos)
        working-directory: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        run: |
          chmod +x ./mvnw
          ./mvnw test

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, y push de imagen (Despachos)
        working-directory: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        env:
          ECR_REPOSITORY: innovatech-despachos
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push -a $ECR_REGISTRY/$ECR_REPOSITORY

      - name: Renderizar Task Definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs/task-def-despachos.json
          container-name: innovatech-despachos
          image: ${{ env.ECR_REGISTRY }}/innovatech-despachos:${{ github.sha }}

      - name: Deploy a Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: innovatech-despachos-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  build-and-deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, y push de imagen (Frontend)
        working-directory: ./front_despacho
        env:
          ECR_REPOSITORY: innovatech-frontend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push -a $ECR_REGISTRY/$ECR_REPOSITORY

      - name: Renderizar Task Definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs/task-def-frontend.json
          container-name: innovatech-frontend
          image: ${{ env.ECR_REGISTRY }}/innovatech-frontend:${{ github.sha }}

      - name: Deploy a Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: innovatech-frontend-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
